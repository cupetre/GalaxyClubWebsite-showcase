<section class="hero" id="home">
  <div class="hero__background"></div>
  <div class="hero__ball hero__ball--red"></div>
  <div class="hero__ball hero__ball--yellow"></div>
  <div class="hero__ball hero__ball--blue"></div>
  <div class="hero__ball hero__ball--black"></div>
  <div class="hero__content">
    <p class="hero__eyebrow">Est. 2025 — Billiards & Coffee House</p>
    <h1 class="hero__title">Where Every <span class="hero__title-accent">Shot</span> Tells a Story</h1>
    <p class="hero__subtitle">Premium billiards tables, fine coffee & an atmosphere crafted for those who appreciate the
      finer game.</p>
    <div class="hero__buttons">
      <button class="btn btn--primary" (click)="scrollToSection('reserve')">
        Reserve a Table
      </button>
      <button class="btn btn--outline" (click)="scrollToSection('about')">Explore More</button>
    </div>
  </div>
</section>
